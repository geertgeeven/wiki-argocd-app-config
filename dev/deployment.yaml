apiVersion: apps/v1
kind: Deployment
metadata:
  name: bioit-wiki
spec:
  selector:
    matchLabels:
      app: klgn-bioit-wiki
  replicas: 2
  template:
    metadata:
      labels:
        app: klgn-bioit-wiki
    spec:
      containers:
      - name: klgn-bioit-wiki
        image: hub.docker.com/r/squidfunk/mkdocs-material:9.7
        ports:
        - containerPort: 8000
