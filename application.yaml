apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bioit-wiki-argo-app
  namespace: klgn-bioit-prod
spec:
  project: default

  source:
    repoURL: https://gitlab.com/nanuchi/argocd-app-config.git
    targetRevision: HEAD
    path: dev
  destination: 
    server: https://kubernetes.default.svc
    namespace: klgn-bioit-prod

  syncPolicy:
    syncOptions:
    - CreateNamespace=true

    automated:
      selfHeal: true
      prune: true
